# =============================================================================
# NOT THE LIVE TMUX CONFIG — DO NOT SYMLINK THIS FILE.
# =============================================================================
#
# tmux configuration in this repo is managed declaratively by Home Manager.
# The single source of truth is:
#
#     modules/home-manager/programs/tmux.nix   (programs.tmux.extraConfig)
#
# Home Manager writes the real config to ~/.config/tmux/tmux.conf and installs
# plugins via pkgs.tmuxPlugins (NOT TPM). Editing this file has no effect.
#
# To change tmux behavior:
#   1. Edit programs.tmux / extraConfig in modules/home-manager/programs/tmux.nix
#   2. Apply:  home-manager switch --flake .
#   3. Reload live:  prefix + r   (sources ~/.config/tmux/tmux.conf)
#
# DevPod integration scripts live in tmux/scripts/ and are symlinked to
# ~/.local/bin/ by the same module (gated on dev-config.tmux.devpodConnect.enable).
#
# gitmux pane-border config: tmux/gitmux.conf  (symlinked to ~/.gitmux.conf).
